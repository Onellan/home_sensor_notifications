send_test_notification:
  name: Send test notification
  description: Send a test notification using Home Sensor Notifications.
  fields:
    sensor:
      name: Sensor
      description: Optional sensor entity to reference in the message.
      example: binary_sensor.front_door
      selector:
        entity:
          domain: binary_sensor
    targets:
      name: Targets
      description: Optional override list of notify service names.
      example:
        - mobile_app_pixel_8
        - mobile_app_iphone
      selector:
        object:
    message:
      name: Message
      description: Optional custom test message.
      example: Front door test notification.
      selector:
        text:
    delivery_mode:
      name: Delivery mode
      description: Optional override for normal, critical, or both delivery.
      example: critical
      selector:
        select:
          options:
            - normal
            - critical
            - both
    sound_enabled:
      name: Enable sound
      description: Optional override to force sound on or off for the test.
      example: true
      selector:
        boolean:
    sound_name:
      name: Sound name
      description: Optional override sound name to use for the test.
      example: default
      selector:
        text:
